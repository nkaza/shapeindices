# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          # Vignettes are Quarto (.qmd) and only ever need to render for the
          # pkgdown/GitHub Pages build (pkgdown.yaml, which already builds
          # them via its own separate quarto-based path) - R CMD check
          # doesn't need to rebuild them too, so skip that step here rather
          # than fight quarto.exe's known Windows-specific issue seeing R CMD
          # build's temporary install library. --no-build-vignettes alone
          # isn't enough - R CMD check separately warns (and, with the
          # default error-on: "warning", fails) when vignettes/ has files
          # but inst/doc doesn't; --ignore-vignettes on the check step itself
          # skips that check too.
          args: 'c("--no-manual", "--as-cran", "--ignore-vignettes")'
          build_args: 'c("--no-manual","--no-build-vignettes")'
